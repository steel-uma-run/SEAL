name: PR
on: pull_request

permissions: {}

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: |
          nix profile add nixpkgs#google-java-format nixpkgs#prettier nixpkgs#treefmt nixpkgs#pnpm

      - name: Check formatting (backend)
        run: treefmt --tree-root backend

      - name: Install dependencies (frontend)
        run: |
          cd frontend
          pnpm i

      - name: Check formatting (frontend)
        run: treefmt --tree-root frontend
