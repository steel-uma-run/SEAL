name: Frontend
on:
  pull_request:
    paths:
      - "frontend/**"

permissions: {}

jobs:
  check-formatting:
    name: Check formatting
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: nix profile add nixpkgs#treefmt nixpkgs#google-java-format nixpkgs#prettier nixpkgs#pnpm

      - name: Install dependencies
        run: |
          cd frontend
          pnpm i

      - name: Check formatting
        run: treefmt --tree-root frontend
