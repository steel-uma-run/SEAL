name: PR (Backend)
on:
  pull_request:
    paths:
      - "backend/**"

permissions: {}

jobs:
  run-test:
    name: Test that it runs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: |
          nix profile add nixpkgs#postgresql_18

      - name: Setup Postgres
        run: |
          sudo mkdir -p /run/postgresql
          sudo chown $USER /run/postgresql

          pg_ctl initdb -D data
          pg_ctl start -D data

          psql --dbname postgres --command "CREATE DATABASE seal;"

      - name: Download dependencies
        run: |
          cd backend

          # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
          JAVA_HOME=$JAVA_HOME_21_X64 mvn dependency:resolve

      - name: Run
        run: |
          cd backend

          # Surely 30s ought to be enough for startup?
          JAVA_HOME=$JAVA_HOME_21_X64 SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/seal timeout \
            --preserve-status \
            --signal SIGINT \
            30s mvn spring-boot:run
