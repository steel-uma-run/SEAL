name: PR (Backend)
on:
  pull_request:
    paths:
      - "backend/**"

permissions: {}

jobs:
  integ-tests:
    name: Very professional enterprise tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: nix profile add nixpkgs#postgresql_18 nixpkgs#bash_unit nixpkgs#httpie nixpkgs#jq

      - name: Setup Postgres
        run: |
          sudo mkdir -p /run/postgresql
          sudo chown $USER /run/postgresql

          pg_ctl initdb -D data
          pg_ctl start -D data

          psql --dbname postgres --command "CREATE DATABASE seal;"

      - name: Run app
        run: |
          cd backend
          JAVA_HOME=$JAVA_HOME_21_X64 SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/seal mvn spring-boot:run &
          sleep 30

      - name: Test
        run: |
          bash_unit backend/tests/*
