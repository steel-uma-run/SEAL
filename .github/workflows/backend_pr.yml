name: Backend
on:
  pull_request:
    paths:
      - "backend/**"

permissions: {}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: nix profile add nixpkgs#postgresql_18

      - name: Setup Postgres
        run: |
          sudo mkdir -p /run/postgresql
          sudo chown $USER /run/postgresql

          pg_ctl initdb -D data
          pg_ctl start -D data

          psql --dbname postgres --command "CREATE DATABASE seal;"

      - name: Run
        run: |
          cd backend

          JAVA_HOME=$JAVA_HOME_21_X64 SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/seal \
            mvn clean test

  check-formatting:
    name: Check formatting
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: nix profile add nixpkgs#treefmt nixpkgs#google-java-format nixpkgs#prettier

      - name: Check formatting
        run: treefmt --tree-root backend
