name: CI
on: pull_request

permissions: {}

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: |
          nix profile add nixpkgs#google-java-format nixpkgs#treefmt

      - name: Check formatting
        run: treefmt
